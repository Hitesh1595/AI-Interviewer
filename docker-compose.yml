# Dev orchestration: FastAPI backend + Vite frontend.
# Put GEMINI_API_KEY in a root .env file (see .env.example) or export it before
# running `docker compose up`.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-2}
      - OPENAI_VOICE=${OPENAI_VOICE:-alloy}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DATABASE_URL=sqlite:////data/ai_interviewer.db
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - ADMIN_SECRET=${ADMIN_SECRET:-dev-admin-secret-change-me}
    volumes:
      - ./backend:/app
      - backend_data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  backend_data:
